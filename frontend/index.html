<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F1 Replay</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>F1 Replay</h1>
    <p class="subtitle">Pick a season, a Grand Prix, and a session to replay the leaderboard.</p>
  </header>

  <main>
    <section class="picker" id="picker">
      <div class="field">
        <label for="year">Year</label>
        <select id="year"></select>
      </div>

      <div class="field">
        <label for="meeting">Grand Prix</label>
        <select id="meeting" disabled>
          <option value="">Select a year first…</option>
        </select>
      </div>

      <div class="field">
        <label for="session">Session</label>
        <select id="session" disabled>
          <option value="">Select a Grand Prix first…</option>
        </select>
      </div>

      <button id="loadBtn" disabled>Load Session</button>
    </section>

    <p id="status" class="status"></p>

    <section class="player" id="player" hidden>
      <div class="player-header">
        <h2 id="playerTitle"></h2>
      </div>

      <div class="controls">
        <button id="playBtn">▶ Play</button>
        <label for="speed">Speed</label>
        <select id="speed">
          <option value="1">1x</option>
          <option value="5">5x</option>
          <option value="10" selected>10x</option>
          <option value="30">30x</option>
          <option value="60">60x</option>
          <option value="120">120x</option>
        </select>
        <span id="timeLabel" class="time-label">00:00</span>
      </div>

      <input type="range" id="scrubber" min="0" max="0" value="0" step="1" />

      <table class="leaderboard">
        <thead>
          <tr>
            <th>Pos</th>
            <th>Code</th>
            <th>Driver</th>
            <th>Lap</th>
            <th>Pits</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
